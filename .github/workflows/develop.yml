# this workflow is triggered when a PR to the develop branch is merged.
# the following steps are performed:
#   - build docker image and push to ECR (image tag is the git describe output as well as 'latest')
#   - deploy image to staging environment
name: develop branch workflow
on:
  push:
    branches:
      - develop
      - ci-github-actions # temporary branch for testing, to be removed once workflow is verified
permissions:
  id-token: write
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        id: checkout-code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: save command output
        id: save-command-output
        run: |
          echo "DOCKER_REPO=analytics-dashboard" >> $GITHUB_ENV
          echo "DOCKER_TAG=$(git describe --tags)" >> $GITHUB_ENV

      - name: configure aws credentials
        id: configure-aws-credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: login to amazon ecr
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: build and push app image to ecr
        id: build-push-app-image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}:${{ env.DOCKER_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}:develop

      - name: build and push liquibase image to ecr
        id: build-push-liquibase-image
        uses: docker/build-push-action@v5
        with:
          context: ./liquibase
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}-liquibase:${{ env.DOCKER_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}-liquibase:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.DOCKER_REPO }}-liquibase:develop
