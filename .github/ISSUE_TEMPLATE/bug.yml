name: 🐞 Bug
description: File a bug/issue
title: "[BUG] <title>"
labels: [Bug, Needs triage]
body: 
- type: checkboxes
  attributes: 
    label: Is there an existing bug/issue for this? 
    description: Please search to see if a similar issue/bug was reported. 
    options:
    - label: I have searched existing bugs/issues.
      required: true
- type: textarea 
  attributes:
    label: Steps to reproduce
    description: How can the bug/issue be reproduced?
    placeholder: |
      1. Go to '...'
      2. Click on '...'
      3. See the error. 
    validations:
      required: false
- type: textarea
  attributes: 
    label: Expected Behaviour 
    description: Explain what you expected to happen. 
    validations: 
      required: false
- type: textarea
  attributes: 
    label: Environment 
    description: |
      Example: 
      - OS: [e.g., Windows, macOS, Linux]
      - Browser: [e.g., Chrome, Firefox]
    render: markdown
    validations: 
      required: false
- type: textarea
  attributes: 
    label: Additional Context 
    description: Add any other context about the problem here.
    validations: 
      required: false
